version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: heartsteel-db
    environment:
      POSTGRES_DB: heartsteel
      POSTGRES_USER: heartsteel
      POSTGRES_PASSWORD: heartsteel123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: heartsteel-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
